<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title }}{% if version %} {{ version }}{% endif %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/app.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    (() => {
      const activateInlineScripts = (root) => {
        if (!root || !root.querySelectorAll) return;
        const scripts = Array.from(root.querySelectorAll("script"));
        scripts.forEach((oldScript) => {
          const newScript = document.createElement("script");
          Array.from(oldScript.attributes).forEach((attr) => {
            newScript.setAttribute(attr.name, attr.value);
          });
          newScript.textContent = oldScript.textContent || "";
          oldScript.replaceWith(newScript);
        });
      };

      const injectResponse = (targetSelector, swapMode, html) => {
        const target = document.querySelector(targetSelector);
        if (!target) return;
        if (swapMode === "outerHTML") {
          target.outerHTML = html;
        } else {
          target.innerHTML = html;
          activateInlineScripts(target);
        }
      };

      const startEstimatedProgress = (form, start = 0, detail = {}) => {
        document.dispatchEvent(new CustomEvent("crosstab:progress-start", { detail: { form, percent: start, ...detail } }));
        let percent = start;
        const timer = window.setInterval(() => {
          percent = percent < 60 ? percent + 8 : percent + 3;
          document.dispatchEvent(new CustomEvent("crosstab:progress-update", { detail: { form, percent: Math.min(percent, 92), ...detail } }));
        }, 220);
        return () => window.clearInterval(timer);
      };

      const submitAjaxForm = (form) => {
        const mode = form.getAttribute("data-ajax-submit");
        const url = form.getAttribute("hx-post") || form.getAttribute("action");
        const targetSelector = form.getAttribute("hx-target") || (mode === "upload" ? "#dataset_area" : null);
        const swapMode = (form.getAttribute("hx-swap") || "innerHTML").trim();
        if (!mode || !url || !targetSelector) return false;

        if (mode === "upload") {
          const xhr = new XMLHttpRequest();
          let stopProcessingProgress = null;
          xhr.open("POST", url, true);
          xhr.setRequestHeader("X-Requested-With", "XMLHttpRequest");
          xhr.onloadstart = () => {
            document.dispatchEvent(new CustomEvent("crosstab:progress-start", {
              detail: {
                form,
                percent: 0,
                estimate: false,
                title: "Uploading files...",
                message: "Sending both workbooks to the server."
              }
            }));
          };
          xhr.upload.onprogress = (event) => {
            if (!event.lengthComputable) return;
            const percent = Math.max(0, Math.min(80, Math.round((event.loaded / event.total) * 80)));
            document.dispatchEvent(new CustomEvent("crosstab:progress-start", {
              detail: {
                form,
                percent,
                estimate: false,
                title: "Uploading files...",
                message: "Uploading workbook data to the server."
              }
            }));
            document.dispatchEvent(new CustomEvent("crosstab:progress-update", {
              detail: {
                form,
                percent,
                title: "Uploading files...",
                message: "Uploading workbook data to the server."
              }
            }));
          };
          xhr.upload.onloadend = () => {
            document.dispatchEvent(new CustomEvent("crosstab:progress-update", {
              detail: {
                form,
                percent: 80,
                title: "Processing workbooks...",
                message: "Upload complete. Reading Excel files and preparing the dataset."
              }
            }));
            stopProcessingProgress = startEstimatedProgress(form, 80, {
              title: "Processing workbooks...",
              message: "Upload complete. Reading Excel files and preparing the dataset."
            });
          };
          xhr.onload = () => {
            if (typeof stopProcessingProgress === "function") {
              stopProcessingProgress();
            }
            if (xhr.status >= 200 && xhr.status < 300) {
              injectResponse(targetSelector, swapMode, xhr.responseText);
              const resultArea = document.querySelector("#result_area");
              if (resultArea) resultArea.innerHTML = "";
              document.dispatchEvent(new CustomEvent("crosstab:fallback-complete", { detail: { form } }));
            } else {
              injectResponse(targetSelector, swapMode, `<div class="card"><p>${xhr.responseText || "Upload failed."}</p></div>`);
              document.dispatchEvent(new CustomEvent("crosstab:fallback-error", { detail: { form, error: xhr.responseText || "Upload failed." } }));
            }
          };
          xhr.onerror = () => {
            if (typeof stopProcessingProgress === "function") {
              stopProcessingProgress();
            }
            document.dispatchEvent(new CustomEvent("crosstab:fallback-error", { detail: { form, error: "Upload failed." } }));
          };
          xhr.send(new FormData(form));
          return true;
        }

        if (mode === "run") {
          const stopProgress = startEstimatedProgress(form, 12, {
            title: "Building preview...",
            message: "Running the crosstab and refreshing the preview tables."
          });
          fetch(url, {
            method: "POST",
            body: new FormData(form),
            headers: { "X-Requested-With": "XMLHttpRequest" },
          })
            .then(async (response) => {
              const html = await response.text();
              if (!response.ok) {
                throw new Error(html || `Request failed with status ${response.status}`);
              }
              injectResponse(targetSelector, swapMode, html);
              document.dispatchEvent(new CustomEvent("crosstab:fallback-complete", { detail: { form } }));
            })
            .catch((error) => {
              injectResponse(targetSelector, swapMode, `<div class="card"><p>${error instanceof Error ? error.message : "Request failed."}</p></div>`);
              document.dispatchEvent(new CustomEvent("crosstab:fallback-error", { detail: { form, error: error instanceof Error ? error.message : "Request failed." } }));
            })
            .finally(() => {
              stopProgress();
            });
          return true;
        }

        return false;
      };

      const submitWithFallback = async (form) => {
        const url = form.getAttribute("hx-post");
        const targetSelector = form.getAttribute("hx-target");
        const swapMode = (form.getAttribute("hx-swap") || "innerHTML").trim();
        if (!url || !targetSelector) return;

        const submitter = form.__fallbackSubmitter || null;
        const body = new FormData(form);
        if (submitter && submitter.name) {
          body.append(submitter.name, submitter.value);
        }

        try {
          const response = await fetch(url, {
            method: "POST",
            body,
            headers: { "X-Requested-With": "XMLHttpRequest" },
          });
          const html = await response.text();
          if (!response.ok) {
            throw new Error(html || `Request failed with status ${response.status}`);
          }
          injectResponse(targetSelector, swapMode, html);
          document.dispatchEvent(new CustomEvent("crosstab:fallback-complete", { detail: { form } }));
        } catch (error) {
          const message = error instanceof Error ? error.message : "Request failed.";
          injectResponse(targetSelector, swapMode, `<div class="card"><p>${message}</p></div>`);
          document.dispatchEvent(new CustomEvent("crosstab:fallback-error", { detail: { form, error: message } }));
        } finally {
          form.__fallbackSubmitter = null;
        }
      };

      document.addEventListener("click", (event) => {
        const button = event.target.closest("button, input[type='submit']");
        if (!button) return;
        const form = button.form;
        if (!form || !form.matches("form[hx-post]")) return;
        form.__fallbackSubmitter = button;
      });

      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) return;
        if (submitAjaxForm(form)) {
          event.preventDefault();
          return;
        }
        if (!form.matches("form[hx-post]")) return;
        event.preventDefault();
        submitWithFallback(form);
      });

      document.addEventListener("crosstab:activate-inline-scripts", (event) => {
        activateInlineScripts(event.detail && event.detail.root ? event.detail.root : document);
      });
    })();
  </script>
  <script>
    (() => {
      const controllers = new WeakMap();

      const getProgressElements = (form) => {
        const key = form.getAttribute("data-progress-form");
        if (!key) return null;
        const panel = document.querySelector(`[data-progress-panel="${key}"]`);
        if (!panel) return null;
        return {
          panel,
          title: panel.querySelector("[data-progress-title]"),
          detail: panel.querySelector("[data-progress-detail]"),
          percentText: panel.querySelector("[data-progress-percent]"),
          meter: panel.querySelector("[data-progress-meter]"),
          buttons: Array.from(form.querySelectorAll('button[type="submit"], input[type="submit"]')),
        };
      };

      const setButtonState = (button, busy) => {
        if (!(button instanceof HTMLElement)) return;
        const idleLabel = button.dataset.idleLabel;
        const busyLabel = button.dataset.busyLabel;
        if (busy) {
          button.setAttribute("disabled", "disabled");
          if (idleLabel && busyLabel) {
            button.textContent = busyLabel;
          }
        } else {
          button.removeAttribute("disabled");
          if (idleLabel) {
            button.textContent = idleLabel;
          }
        }
      };

      const renderProgress = (elements, percent) => {
        const safePercent = Math.max(0, Math.min(100, Math.round(percent)));
        if (elements.percentText) {
          elements.percentText.textContent = `${safePercent}%`;
        }
        if (elements.meter) {
          elements.meter.style.width = `${safePercent}%`;
        }
      };

      const renderProgressCopy = (elements, title, message) => {
        if (elements.title && title) {
          elements.title.textContent = title;
        }
        if (elements.detail && message) {
          elements.detail.textContent = message;
        }
      };

      const beginProgress = (form, options = {}) => {
        const elements = getProgressElements(form);
        if (!elements) return;
        const existing = controllers.get(form);
        if (existing && existing.timer) {
          window.clearInterval(existing.timer);
        }

        elements.panel.hidden = false;
        form.classList.add("is-busy");
        elements.buttons.forEach((button) => setButtonState(button, true));
        renderProgressCopy(elements, options.title, options.message);
        renderProgress(elements, Number(options.percent ?? 0));

        const state = { percent: Number(options.percent ?? 0), timer: null };
        if (options.estimate !== false) {
          state.timer = window.setInterval(() => {
            state.percent = state.percent < 60 ? state.percent + 8 : state.percent + 3;
            renderProgress(elements, Math.min(state.percent, 92));
          }, 220);
        }
        controllers.set(form, state);
      };

      const finishProgress = (form) => {
        const elements = getProgressElements(form);
        if (!elements) return;
        const state = controllers.get(form);
        if (state && state.timer) {
          window.clearInterval(state.timer);
        }
        renderProgress(elements, 100);
        window.setTimeout(() => {
          elements.panel.hidden = true;
          form.classList.remove("is-busy");
          elements.buttons.forEach((button) => setButtonState(button, false));
        }, 260);
        controllers.delete(form);
      };

      const bindForms = (root = document) => {
        const forms = Array.from(root.querySelectorAll("[data-progress-form]"));
        forms.forEach((form) => {
          if (!(form instanceof HTMLFormElement) || form.dataset.progressBound === "true") return;
          form.dataset.progressBound = "true";
          if (form.dataset.ajaxSubmit) return;
          form.addEventListener("submit", () => beginProgress(form));
        });
      };

      const formFromEvent = (event) => {
        const elt = event?.detail?.elt;
        if (elt && typeof elt.closest === "function") {
          return elt.closest("[data-progress-form]");
        }
        return null;
      };

      document.addEventListener("DOMContentLoaded", () => bindForms(document));
      document.addEventListener("crosstab:progress-start", (event) => {
        const form = event.detail && event.detail.form;
        if (!form) return;
        beginProgress(form, event.detail || {});
        const elements = getProgressElements(form);
        if (!elements) return;
        renderProgressCopy(elements, event.detail && event.detail.title, event.detail && event.detail.message);
        renderProgress(elements, Number(event.detail.percent || 0));
      });
      document.addEventListener("crosstab:progress-update", (event) => {
        const form = event.detail && event.detail.form;
        if (!form) return;
        const elements = getProgressElements(form);
        if (!elements) return;
        renderProgressCopy(elements, event.detail && event.detail.title, event.detail && event.detail.message);
        renderProgress(elements, Number(event.detail.percent || 0));
      });
      document.addEventListener("crosstab:fallback-complete", (event) => {
        const form = event.detail && event.detail.form;
        if (form) finishProgress(form);
        bindForms(document);
      });
      document.addEventListener("crosstab:fallback-error", (event) => {
        const form = event.detail && event.detail.form;
        if (form) finishProgress(form);
      });
      document.body.addEventListener("htmx:afterRequest", (event) => {
        const form = formFromEvent(event);
        if (form) finishProgress(form);
      });
      document.body.addEventListener("htmx:responseError", (event) => {
        const form = formFromEvent(event);
        if (form) finishProgress(form);
      });
      document.body.addEventListener("htmx:afterSwap", (event) => {
        if (event.detail && event.detail.elt) {
          document.dispatchEvent(new CustomEvent("crosstab:activate-inline-scripts", { detail: { root: event.detail.elt } }));
        }
        bindForms(document);
      });
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <div class="container shell-head">
      <div class="brand">
        <div class="brand-title">{{ title }}</div>
        {% if version %}
          <div class="brand-version">{{ version }}</div>
        {% endif %}
        <div class="brand-sub">Build crosstabs from Toluna Analytics value and label exports.</div>
      </div>
    </div>
  </header>

  <main class="container app-shell">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
