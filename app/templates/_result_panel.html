<div id="crosstab-results">
  {% for table in result.tables %}
    <h3>{{ table.kind | title }}</h3>
    <table>
      <thead>
        <tr>
          <th>{{ result.row_label }}</th>
          {% for col in table.columns %}
            <th>{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in table.rows %}
          <tr>
            <td>{{ row.__label__ }}</td>
            {% for col in table.columns %}
              <td>{{ row[col] }}</td>
            {% endfor %}
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% endfor %}
</div>
