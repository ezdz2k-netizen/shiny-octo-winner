<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Simple Crosstab Application</title>
  <style>
    body { font-family: system-ui, Arial; margin: 24px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; max-width: 980px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    select, input, button { padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; }
    pre { background: #f7f7f7; padding: 12px; border-radius: 10px; overflow:auto; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
  </style>
</head>
<body>
  <h2>Simple Crosstab Application</h2>
  <div class="card">
    <h3>1) Upload data (CSV/XLSX)</h3>
    <div class="row">
      <input id="file" type="file" accept=".csv,.xlsx,.xls"/>
      <button onclick="upload()">Upload</button>
      <span id="status"></span>
    </div>

    <h3 style="margin-top:18px;">2) Choose variables</h3>
    <div class="row">
      <label>Row:
        <select id="rowVar"></select>
      </label>
      <label>Column (up to 2 layers):
        <select id="colVar1"></select>
      </label>
      <label>Column layer 2 (optional):
        <select id="colVar2"></select>
      </label>
      <label>Weight (optional):
        <select id="wtVar"></select>
      </label>
    </div>

    <h3 style="margin-top:18px;">3) Options</h3>
    <div class="row">
      <label><input id="includeCounts" type="checkbox" checked/> Include counts</label>
      <label><input id="includeRowPct" type="checkbox" checked/> Row %</label>
      <label><input id="includeColPct" type="checkbox" checked/> Column %</label>
      <label><input id="mrMode" type="checkbox"/> Treat Row as MR (dichotomies)</label>
      <label>MR value:
        <input id="mrValue" type="text" value="1" style="width:80px"/>
      </label>
      <button onclick="runCrosstab()">Run</button>
      <button onclick="exportXlsx()">Export XLSX</button>
    </div>

    <h3 style="margin-top:18px;">Preview</h3>
    <div id="preview"></div>
    <h4>Debug</h4>
    <pre id="debug"></pre>
  </div>

<script>
let datasetId = null;

function setStatus(msg){ document.getElementById('status').textContent = msg; }
function setDebug(obj){ document.getElementById('debug').textContent = JSON.stringify(obj, null, 2); }

async function upload(){
  const f = document.getElementById('file').files[0];
  if(!f){ setStatus("Choose a file"); return; }
  const fd = new FormData();
  fd.append("file", f);
  setStatus("Uploading...");
  const r = await fetch("/upload", { method:"POST", body: fd });
  const j = await r.json();
  setDebug(j);
  if(!r.ok){ setStatus("Upload failed"); return; }
  datasetId = j.dataset_id;
  setStatus("Uploaded: " + j.filename);

  const v = await fetch(`/variables?dataset_id=${encodeURIComponent(datasetId)}`);
  const vars = await v.json();
  setDebug(vars);

  const selects = ["rowVar","colVar1","colVar2","wtVar"];
  selects.forEach(id=>{
    const el = document.getElementById(id);
    el.innerHTML = "";
    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = id==="colVar2"||id==="wtVar" ? "(none)" : "(select)";
    el.appendChild(opt0);
    vars.columns.forEach(c=>{
      const o = document.createElement("option");
      o.value=c; o.textContent=c;
      el.appendChild(o);
    });
  });
}

function renderTable(res){
  if(!res || !res.table){ return; }
  const tbl = res.table;
  let html = "<table><thead><tr>";
  tbl.header.forEach(h=> html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";
  tbl.rows.forEach(row=>{
    html += "<tr>";
    row.forEach((cell, idx)=>{
      html += `<td>${cell}</td>`;
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  document.getElementById('preview').innerHTML = html;
}

async function runCrosstab(){
  if(!datasetId){ setStatus("Upload first"); return; }
  const payload = {
    dataset_id: datasetId,
    row: document.getElementById("rowVar").value,
    col1: document.getElementById("colVar1").value,
    col2: document.getElementById("colVar2").value || null,
    weight: document.getElementById("wtVar").value || null,
    include_counts: document.getElementById("includeCounts").checked,
    include_row_pct: document.getElementById("includeRowPct").checked,
    include_col_pct: document.getElementById("includeColPct").checked,
    mr_mode: document.getElementById("mrMode").checked,
    mr_value: document.getElementById("mrValue").value
  };
  const r = await fetch("/crosstab", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
  const j = await r.json();
  setDebug(j);
  if(!r.ok){ setStatus("Run failed"); return; }
  setStatus("OK");
  renderTable(j);
}

async function exportXlsx(){
  if(!datasetId){ setStatus("Upload first"); return; }
  const payload = {
    dataset_id: datasetId,
    row: document.getElementById("rowVar").value,
    col1: document.getElementById("colVar1").value,
    col2: document.getElementById("colVar2").value || null,
    weight: document.getElementById("wtVar").value || null,
    include_counts: document.getElementById("includeCounts").checked,
    include_row_pct: document.getElementById("includeRowPct").checked,
    include_col_pct: document.getElementById("includeColPct").checked,
    mr_mode: document.getElementById("mrMode").checked,
    mr_value: document.getElementById("mrValue").value
  };
  const r = await fetch("/export", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
  if(!r.ok){
    const j = await r.json().catch(()=>({}));
    setDebug(j);
    setStatus("Export failed");
    return;
  }
  const blob = await r.blob();
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "crosstab_export.xlsx";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setStatus("Exported");
}
</script>
</body>
</html>
