
<!DOCTYPE html>
<html>
<head>
<style>
.table { width:100%; border-collapse:collapse; }
.table th,.table td{ padding:10px; border-bottom:1px solid #ddd; text-align:right;}
.table th:first-child,.table td:first-child{text-align:left;}
.btn{ padding:10px 16px; background:#4f46e5; color:#fff; border-radius:10px; text-decoration:none;}
.right{ display:flex; justify-content:flex-end; }
</style>
</head>
<body>
<h2>{{ table.title }}</h2>
<table class="table">
<tr>
<th></th>
{% for h in table.headers %}<th>{{h}}</th>{% endfor %}
</tr>
<tr>
<td><b>Base</b></td>
{% for b in table.base %}<td><b>{{b}}</b></td>{% endfor %}
</tr>
{% for r, vals in table.rows %}
<tr>
<td>{{r}}</td>
{% for v in vals %}
<td>{{ "%.2f"|format(v) }}{% if table.show_pct %}%{% endif %}</td>
{% endfor %}
</tr>
{% endfor %}
</table>

<div class="right" style="margin-top:20px">
<a class="btn" href="/export/dummy">Export Excel</a>
</div>
</body>
</html>
